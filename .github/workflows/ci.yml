name: CI

# Documentation-only changes (docs/ and Markdown anywhere, including the
# agent rule files) skip CI entirely: no branch protection requires these
# checks, so a docs-only PR stays mergeable with zero checks reported.
# Locale/asset changes still run CI — they affect runtime behavior.
on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"

# Newer pushes to the same branch/PR supersede running checks.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - uses: jdx/mise-action@v2

      - name: Format check
        run: mise run fmt

      - name: Anti-pattern lint
        run: mise run lint:patterns

      - name: Clippy
        run: mise run clippy

      - name: Test
        run: mise run test

  bench:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-bench-

      - uses: jdx/mise-action@v2

      - name: Benchmark (dry run)
        run: mise exec -- cargo bench --workspace -- --test
