name: ravel
description: "Ravel implementation workflow: implement → review → docs update"
max_steps: 20

personas:
  implementer: ../facets/personas/implementer.md
  reviewer: ../facets/personas/reviewer.md
  doc-updater: ../facets/personas/doc-updater.md
policies:
  coding: ../facets/policies/ravel-coding.md

initial_step: implement

steps:
  - name: implement
    persona: implementer
    policy: coding
    edit: true
    provider_options:
      claude:
        allowed_tools: [Read, Glob, Grep, Edit, Write, Bash]
    quality_gates:
      - "cargo test passes for affected crates"
      - "cargo clippy has no warnings for affected crates"
    rules:
      - condition: "implemented"
        next: review
      - condition: "blocked"
        next: ABORT
    instruction: |
      Read the task specification and implement it according to the Ravel architecture.

      ## Steps
      1. Read the task's order.md for requirements
      2. Read relevant docs/specifications/ and docs/requirements/ for context
      3. Implement the code changes
      4. Write unit tests
      5. Run `cargo test` and `cargo clippy` on affected crates
      6. Fix any issues until tests and clippy pass

      ## Commit rules (important)
      Commit each logical unit as soon as it is complete. Do NOT batch commits at the end.

      Examples of logical units:
      - Adding a new type/trait definition
      - Implementing a single feature or function
      - Adding tests for a specific module
      - A bug fix
      - Adding crate dependencies

      Commit messages: single line, English, prefix required (`feat:`, `fix:`, `refactor:`, `test:`, `chore:`).
      Do NOT include task IDs or issue numbers.
      Run `cargo fmt --all` before each commit.

      ## Out of scope
      - Unrelated refactoring
      - Features beyond the task specification
      - Documentation updates (handled by a later step)

    output_contract: |
      ## Output
      - `status`: "implemented" | "blocked"
      - `commits`: list of logical-unit commits (hash + message)
      - `tests_added`: number of tests added
      - `summary`: 1-2 line summary of what was implemented

  - name: review
    persona: reviewer
    edit: false
    provider_options:
      claude:
        allowed_tools: [Read, Glob, Grep, Bash]
    rules:
      - condition: "approved"
        next: update-docs
      - condition: "needs_fix"
        next: fix
    instruction: |
      Review the implementation changes made in the previous step.

      1. Run `git log` and `git diff` to understand what changed
      2. Check against CLAUDE.md conventions
      3. Check against relevant docs/specifications/
      4. Report findings with severity and file:line references

      Severity:
      - **Critical**: Must fix (logic errors, security, architecture violations)
      - **Warning**: Non-blocking. Note for future.
      - **Info**: Suggestions. Do not block.

      Critical findings → "needs_fix". Otherwise → "approved".

    output_contract: |
      ## Output
      - `status`: "approved" | "needs_fix"
      - `findings`: list of findings (severity, file, line, summary)

  - name: fix
    persona: implementer
    policy: coding
    edit: true
    provider_options:
      claude:
        allowed_tools: [Read, Glob, Grep, Edit, Write, Bash]
    quality_gates:
      - "cargo test passes after fixes"
    rules:
      - condition: "fixed"
        next: review
      - condition: "blocked"
        next: ABORT
    instruction: |
      Fix the critical issues identified in the review.
      Apply fixes, then run `cargo test` and `cargo clippy` to verify.
      Commit each fix as a separate logical unit.

    output_contract: |
      ## Output
      - `status`: "fixed" | "blocked"
      - `commits`: list of fix commits (hash + message)

  - name: update-docs
    persona: doc-updater
    edit: true
    provider_options:
      claude:
        allowed_tools: [Read, Glob, Grep, Edit, Write, Bash]
    rules:
      - condition: "updated"
        next: COMPLETE
      - condition: "no_changes"
        next: COMPLETE
    instruction: |
      The implementation has been reviewed and approved. Update documentation:

      1. `docs/implementation/plan.md`: set task status to `✅ Done`, update milestone progress count
      2. `docs/implementation/tasks/TASK-XXX.md`: update completion condition checkboxes
      3. `docs/specifications/`: reflect any spec changes from the implementation
      4. `docs/requirements/`: update acceptance criteria if refined
      5. Commit changes with a `docs:` prefix if any files were modified

    output_contract: |
      ## Output
      - `status`: "updated" | "no_changes"
      - `files_changed`: list of updated files

loop_monitors:
  - cycle: [review, fix]
    threshold: 3
    judge:
      persona: reviewer
      instruction: |
        The review-fix cycle has repeated {step_iteration} times.
        Check whether the previous fix resolved the flagged issues.
        If the same issues keep recurring, abort.
      rules:
        - condition: "progress"
          next: fix
        - condition: "stuck"
          next: ABORT
