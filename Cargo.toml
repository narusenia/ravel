[workspace]
resolver = "2"
members = [
    "crates/ravel-core",
    "crates/ravel-gpu",
    "crates/ravel-media",
    "crates/ravel-ui",
    "crates/ravel-app",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "Apache-2.0 OR MIT"
authors = ["The Ravel Authors"]
repository = "https://github.com/NaruseNia/ravel"
rust-version = "1.80"

[workspace.dependencies]
ravel-core = { path = "crates/ravel-core" }
ravel-gpu = { path = "crates/ravel-gpu" }
ravel-media = { path = "crates/ravel-media" }
ravel-ui = { path = "crates/ravel-ui" }

im = "15"
thiserror = "2"
anyhow = "1"
